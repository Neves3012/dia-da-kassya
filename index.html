<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agenda Kassya</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen" class="login-screen">

  <div class="login-card">

    <h1>🌙 acesso</h1>

    <input type="password" id="passwordInput" placeholder="senha..." />

    <button id="loginBtn">entrar</button>

    <p id="loginError"></p>

  </div>

</div>

<!-- 🌙 APP -->
<div id="app" class="container" style="display:none;">

  <div class="progress-card">
    <div class="progress-header">
      <span>progresso</span>
      <span id="progressText">0%</span>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="agenda" id="agenda"></div>

  <button class="add-task-btn" id="addTaskBtn">+ adicionar</button>

  <button class="report-btn" id="dailyReportBtn">
    💌 enviar relatório
  </button>

</div>

<!-- MODAL -->
<div id="taskModal" class="modal hidden">

  <div class="modal-card">

    <button class="close-btn" id="closeModal">X</button>

    <input id="taskTime" placeholder="hora">
    <input id="taskTitle" placeholder="título">
    <textarea id="taskMessage" placeholder="mensagem"></textarea>

    <div class="modal-actions">
      <button id="saveTask" class="save-btn">salvar</button>
      <button id="deleteTask" class="delete-btn">deletar</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
